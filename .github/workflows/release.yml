name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: read

jobs:
  build-and-upload:
    name: Build and Upload
    runs-on: ubuntu-latest

    steps:
      - name: Set image name
        id: image
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner}/3dsync-devcontainer:latest" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare build image
        run: docker pull "${{ steps.image.outputs.name }}" || docker build -f docker/3dsync-devcontainer.Dockerfile -t "${{ steps.image.outputs.name }}" .

      - name: Build
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "${{ steps.image.outputs.name }}" \
            sh -lc 'git config --global --add safe.directory /workspace && git config --global --add safe.directory /workspace/buildtools && make'
          sudo chown -R "$USER" output/

      - name: Rename release assets
        run: |
          cp output/3DSyncZakary.zip output/3DSyncZakary-${{ github.ref_name }}.zip
          cp output/3ds-arm/3ds/3DSyncZakary/3DSyncZakary.3dsx output/3ds-arm/3ds/3DSyncZakary/3DSyncZakary-${{ github.ref_name }}.3dsx
          cp output/3ds-arm/3DSyncZakary.3ds output/3ds-arm/3DSyncZakary-${{ github.ref_name }}.3ds
          cp output/3ds-arm/3DSyncZakary.cia output/3ds-arm/3DSyncZakary-${{ github.ref_name }}.cia

      - name: Upload release assets
        run: |
          gh release upload "${{ github.ref_name }}" --clobber \
            output/3DSyncZakary-${{ github.ref_name }}.zip \
            output/3ds-arm/3ds/3DSyncZakary/3DSyncZakary-${{ github.ref_name }}.3dsx \
            output/3ds-arm/3DSyncZakary-${{ github.ref_name }}.3ds \
            output/3ds-arm/3DSyncZakary-${{ github.ref_name }}.cia
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate QR code for CIA
        run: |
          sudo apt-get update
          sudo apt-get install -q -y qrencode
          cia_url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/3DSyncZakary-${{ github.ref_name }}.cia"
          qrencode -s 10 -o "3DSyncZakary-${{ github.ref_name }}-qr.png" "$cia_url"

      - name: Upload QR code and inject into release notes
        run: |
          gh release upload "${{ github.ref_name }}" "3DSyncZakary-${{ github.ref_name }}-qr.png" --clobber
          qr_url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/3DSyncZakary-${{ github.ref_name }}-qr.png"
          qr_markdown="---\n\n### QR Code for CIA\n\n![QR Code for CIA]($qr_url)"
          body=$(gh release view "${{ github.ref_name }}" --json body -q .body)
          if echo "$body" | grep -qF "![QR Code for CIA]($qr_url)"; then
            echo "QR code already present in release notes, skipping"
          else
            new_body=$(echo "$body" | awk -v qr="$qr_markdown" '/^\*\*Full Changelog\*\*/ { print qr; print ""; print; next } 1')
            echo "$new_body" > release_notes.md
            gh release edit "${{ github.ref_name }}" --notes-file release_notes.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
