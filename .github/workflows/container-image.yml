name: Container Image

on:
  push:
    branches:
      - master
    paths:
      - docker/3dsync-devcontainer.Dockerfile
      - .github/workflows/container-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Build Image
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner}/3dsync-devcontainer" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          echo "tags=${{ steps.image.outputs.name }}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF_NAME}" = "master" ]; then
            echo "latest=${{ steps.image.outputs.name }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "latest=${{ steps.image.outputs.name }}:${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/3dsync-devcontainer.Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.tags }}
            ${{ steps.tags.outputs.latest }}
